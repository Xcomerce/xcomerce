# Stack Swarm + Traefik — deploy xcommerce
#
# Imagem: sagittadigital/xcommerce:latest
# Host:   xcommerce.sagittadigital.com.br
# Build/push: .\scripts\docker-build-push.ps1
#
# IMPORTANTE: o Docker build usa o código LOCAL (COPY . .), não clona do GitHub.
#
# Pré-requisitos no servidor:
#   - Rede externa `sagitta` criada
#   - Traefik com entrypoint websecure + certresolver letsencryptresolver
#   - `docker login` como sagittadigital
#
# Deploy / atualização:
#   docker stack deploy -c docker-compose.stack.yml xcommerce
#
# Forçar pull da nova imagem nos nós:
#   docker service update --force xcommerce_xcommerce

version: "3.8"

services:
  xcommerce:
    image: sagittadigital/xcommerce:latest
    networks:
      - sagitta
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=sagitta"
        - "traefik.http.routers.xcommerce.rule=Host(`xcommerce.sagittadigital.com.br`)"
        - "traefik.http.routers.xcommerce.entrypoints=websecure"
        - "traefik.http.routers.xcommerce.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.xcommerce.service=xcommerce-svc"
        - "traefik.http.services.xcommerce-svc.loadbalancer.server.port=80"

networks:
  sagitta:
    external: true
    name: sagitta
